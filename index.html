<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Label Automator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white text-center py-4 shadow-md">
        <h1 class="text-xl font-bold uppercase tracking-wider">Dispatch Automator</h1>
        <p class="text-xs opacity-75">MESCO INC. Logistics</p>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">
        <div class="bg-white rounded-lg shadow-md p-6 space-y-4">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Select Your Station / Printer:</label>
                <select id="station" class="w-full border border-gray-300 rounded-md p-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-gray-800">
                    <option value="Station 1">Station 1 (Area A)</option>
                    <option value="Station 2">Station 2 (Area B)</option>
                </select>
            </div>

            <hr class="border-gray-200my-2">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Customer Name:</label>
                <input type="text" id="customerName" placeholder="e.g. Juan Dela Cruz" class="w-full border border-gray-300 rounded-md p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Reference Number:</label>
                <input type="text" id="referenceNo" placeholder="e.g. REF-100234" class="w-full border border-gray-300 rounded-md p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Current Package:</label>
                    <input type="number" id="currentPkg" value="1" min="1" class="w-full border border-gray-300 rounded-md p-3 text-center focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Total Packages:</label>
                    <input type="number" id="totalPkg" value="1" min="1" class="w-full border border-gray-300 rounded-md p-3 text-center focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <button id="btnSubmit" onclick="submitData()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-md shadow transition duration-200 uppercase tracking-wide">
                Print & Save Label
            </button>

            <div id="statusMessage" class="hidden text-center text-sm font-semibold p-2 rounded-md"></div>

            <div class="flex flex-col items-center justify-center pt-4 border-t border-gray-100">
                <p class="text-xs text-gray-400 mb-2">QR Preview:</p>
                <div id="qrcode" class="p-2 bg-white border border-gray-200 rounded shadow-sm"></div>
            </div>

        </div>
    </main>

    <footer class="text-center py-3 text-xs text-gray-500 bg-gray-200">
        &copy; 2026 Warehouse Automation V2
    </footer>

    <script>
        // Replace this URL with your deployed Google Apps Script Web App URL
        const WEB_APP_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";
        
        let qrContainer = document.getElementById("qrcode");
        let qrcode = new QRCode(qrContainer, {
            width: 128,
            height: 128,
            correctLevel: QRCode.CorrectLevel.H
        });

        function showStatus(text, type) {
            const msgDiv = document.getElementById("statusMessage");
            msgDiv.innerText = text;
            msgDiv.className = `text-center text-sm font-semibold p-2 rounded-md block ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
        }

        async function submitData() {
            const btn = document.getElementById("btnSubmit");
            const station = document.getElementById("station").value;
            const customerName = document.getElementById("customerName").value.trim();
            const referenceNo = document.getElementById("referenceNo").value.trim().toUpperCase();
            const currentPkg = document.getElementById("currentPkg").value;
            const totalPkg = document.getElementById("totalPkg").value;

            // Form validation
            if (!customerName || !referenceNo) {
                showStatus("Please fill out all fields!", "error");
                return;
            }

            const pkgCountStr = `${currentPkg} of ${totalPkg}`;
            
            // Format data text that will be embedded inside the QR code (Plain Text Setup)
            const qrText = `MESCO INC.\nCust: ${customerName}\nRef: ${referenceNo}\nPkg: ${pkgCountStr}`;
            
            // Generate the QR code visually on screen
            qrcode.clear();
            qrcode.makeCode(qrText);

            // Disable button during network transmission
            btn.disabled = true;
            btn.innerText = "Syncing with Cloud...";
            showStatus("Uploading dispatch logs via data...", "success");

            const payload = {
                station: station,
                customerName: customerName,
                referenceNo: referenceNo,
                pkgCount: pkgCountStr
            };

            try {
                // Submit to Google Sheets via Mobile Data / Cloud
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors", // Necessary for cross-origin Apps Script posts without CORS configuration
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                // Since 'no-cors' returns an opaque response, we assume success if no network crash occurs
                showStatus(`Successfully queued for ${station}!`, "success");
                
                // Reset text inputs for the next package, but retain the Station selection
                document.getElementById("customerName").value = "";
                document.getElementById("referenceNo").value = "";
                document.getElementById("currentPkg").value = parseInt(currentPkg) + 1; // Auto-increment pkg number

            } catch (error) {
                console.error(error);
                showStatus("Network Error! Check your mobile data.", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Print & Save Label";
            }
        }
    </script>
</body>
</html>
