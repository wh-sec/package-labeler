<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Package Labeler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .navbar {
      background-color: #2563eb !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .navbar-title {
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    .form-label {
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }
    .form-control, .form-select {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    .form-control:focus, .form-select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .btn-submit {
      background-color: #16a34a;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 0.85rem;
      text-transform: uppercase;
      transition: background-color 0.2s ease;
    }
    .btn-submit:hover {
      background-color: #15803d;
    }
    .btn-submit:disabled {
      background-color: #9ca3af;
    }
    .footer-text {
      color: #6b7280;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark mb-4">
    <div class="container justify-content-center">
      <span class="navbar-brand mb-0 h1 navbar-title">Package Labeler</span>
    </div>
  </nav>

  <div class="container mb-5" style="max-width: 600px;">
    <div class="card p-4 bg-white">
      <form id="labelForm">
        
        <div class="mb-4">
          <label for="station" class="form-label">Select Your Station / Printer:</label>
          <select class="form-select" id="station" required>
            <option value="Station 1">NAA</option>
            <option value="Station 2">HPB</option>
          </select>
        </div>

        <div class="mb-4">
          <label for="customerName" class="form-label">Customer Name:</label>
          <input type="text" class="form-control" id="customerName" placeholder="e.g. Juan Dela Cruz" required>
        </div>

        <div class="mb-4">
          <label for="referenceNo" class="form-label">Reference Number:</label>
          <input type="text" class="form-control" id="referenceNo" placeholder="E.G. REF-100234" required>
        </div>

        <div class="mb-4">
          <label for="pkgCount" class="form-label">Total Packages:</label>
          <input type="number" class="form-control text-center fw-bold fs-5" id="pkgCount" value="1" min="1" required>
        </div>

        <div class="d-grid mb-3">
          <button type="submit" id="submitBtn" class="btn-submit btn-lg">Print & Save Label</button>
        </div>

      </form>
    </div>

    <div class="text-center mt-4">
      <p class="footer-text">© Warehouse Section</p>
    </div>
  </div>

  <script>
    // Corrected to standard JavaScript comment syntax to prevent errors
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxpawExBCSlJv2zO1aU24YrJvvDKKa1aLtlQbdZlaH3Ejz0HGsKMQdiA0MhYDuLg9ONmA/exec";

    document.getElementById('labelForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerText = "SAVING LABEL...";

      const selectedStation = document.getElementById('station').value; 
      
      const payload = {
        customerName: document.getElementById('customerName').value,
        referenceNo: document.getElementById('referenceNo').value,
        pkgCount: document.getElementById('pkgCount').value,
        station: selectedStation
      };

      fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors', 
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      })
      .then(() => {
        alert("Label saved successfully to cloud queue!");
        document.getElementById('customerName').value = '';
        document.getElementById('referenceNo').value = '';
        document.getElementById('pkgCount').value = '1';
        submitBtn.disabled = false;
        submitBtn.innerText = "PRINT & SAVE LABEL";
      })
      .catch(err => {
        alert("Error saving label: " + err);
        submitBtn.disabled = false;
        submitBtn.innerText = "PRINT & SAVE LABEL";
      });
    });
  </script>
</body>
</html>
