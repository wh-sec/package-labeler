<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Labeler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white text-center py-5 shadow-md">
        <h1 class="text-xl font-bold uppercase tracking-wider">Package Labeler</h1>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">
        <div class="bg-white rounded-lg shadow-md p-6 space-y-4">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Select Your Station / Printer:</label>
                <select id="station" class="w-full border border-gray-300 rounded-md p-3 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-gray-800">
                    <option value="Station 1">NAA</option>
                    <option value="Station 2">HPB</option>
                </select>
            </div>

            <hr class="border-gray-200">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Customer Name:</label>
                <input type="text" id="customerName" placeholder="e.g. Juan Dela Cruz" class="w-full border border-gray-300 rounded-md p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Reference Number:</label>
                <input type="text" id="referenceNo" placeholder="e.g. REF-100234" class="w-full border border-gray-300 rounded-md p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Total Packages:</label>
                <input type="number" id="totalPkg" value="1" min="1" class="w-full border border-gray-300 rounded-md p-3 text-center focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-lg">
            </div>

            <button id="btnSubmit" onclick="submitData()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-md shadow transition duration-200 uppercase tracking-wide">
                Print & Save Label
            </button>

            <div id="statusMessage" class="hidden text-center text-sm font-semibold p-2 rounded-md"></div>

            <div class="flex flex-col items-center justify-center pt-4 border-t border-gray-100">
                <p class="text-xs text-gray-400 mb-2">QR Preview:</p>
                <div id="qrcode" class="p-2 bg-white border border-gray-200 rounded shadow-sm"></div>
            </div>

        </div>
    </main>

    <footer class="text-center py-3 text-xs text-gray-500 bg-gray-200">
        &copy; Warehouse Section
    </footer>

    <script>
        // Paalala: Siguraduhing ilagay ang iyong Apps Script Web App URL dito
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzY-sQsPg4v40XgKVA8NUpMy6CJe3ZwJt263hOzUiAeTj6KhtvOMroP0RWQ1GYs18heFg/exec";
        
        let qrContainer = document.getElementById("qrcode");
        let qrcode = new QRCode(qrContainer, {
            width: 128,
            height: 128,
            correctLevel: QRCode.CorrectLevel.H
        });

        function showStatus(text, type) {
            const msgDiv = document.getElementById("statusMessage");
            msgDiv.innerText = text;
            msgDiv.className = `text-center text-sm font-semibold p-2 rounded-md block ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
        }

        async function submitData() {
            const btn = document.getElementById("btnSubmit");
            const station = document.getElementById("station").value;
            const customerName = document.getElementById("customerName").value.trim();
            const referenceNo = document.getElementById("referenceNo").value.trim().toUpperCase();
            const totalPkg = document.getElementById("totalPkg").value;

            if (!customerName || !referenceNo) {
                showStatus("Please fill out all fields!", "error");
                return;
            }

            // Gagawa ng label string format (halimbawa: "1 Pkgs") para sa upload data
            const pkgCountStr = `${totalPkg} Pkgs`;
            const qrText = `MESCO INC.\nCust: ${customerName}\nRef: ${referenceNo}\nPkg: ${pkgCountStr}`;
            
            qrcode.clear();
            qrcode.makeCode(qrText);

            btn.disabled = true;
            btn.innerText = "Syncing with Cloud...";
            showStatus("Uploading dispatch logs via data...", "success");

            const payload = {
                station: station,
                customerName: customerName,
                referenceNo: referenceNo,
                pkgCount: pkgCountStr
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                // Ipapakita kung anong istasyon ang nakasalo ng print request
                const stationLabel = (station === "Station 1") ? "NAA" : "HPB";
                showStatus(`Successfully queued for ${stationLabel}!`, "success");
                
                document.getElementById("customerName").value = "";
                document.getElementById("referenceNo").value = "";
                document.getElementById("totalPkg").value = "1";

            } catch (error) {
                console.error(error);
                showStatus("Network Error! Check your mobile data.", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Print & Save Label";
            }
        }
    </script>
</body>
</html>
